<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Subtle background glow/shadow -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#4f46e5" flood-opacity="0.25" />
    </filter>
  </defs>
  
  <!-- Rounded Rect container rotated slightly to match the Logo component -->
  <g transform="rotate(3, 256, 256)" filter="url(#glow)">
    <rect x="32" y="32" width="448" height="448" rx="128" fill="#4f46e5" />
    <text 
      x="244" 
      y="280" 
      font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
      font-weight="900" 
      font-style="italic" 
      font-size="280" 
      fill="#ffffff" 
      dominant-baseline="middle" 
      text-anchor="middle"
      letter-spacing="-10"
    >C</text>
  </g>
</svg>
